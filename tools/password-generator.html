<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator | FreeTools Hub</title>
    <meta name="description" content="Generate strong, random passwords for free. Customize length and characters to create secure passwords for your accounts.">
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-surface text-slate-100">
    <header class="border-b border-white/5 bg-dark-surface/80 backdrop-blur-lg">
        <nav class="container mx-auto flex items-center justify-between px-6 py-4">
            <a href="/" class="flex items-center space-x-2">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-brand-primary to-brand-secondary text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">FreeTools<span class="text-brand-primary">Hub</span></span>
            </a>
            <a href="/" class="text-sm font-medium hover:text-brand-primary">Home</a>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="mx-auto max-w-2xl">
            <div class="glass rounded-[2.5rem] p-8 md:p-12">
                <div class="text-center">
                    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-purple-500/10 text-purple-400">
                        <i class="fas fa-lock text-3xl"></i>
                    </div>
                    <h1 class="mt-6 text-3xl font-extrabold tracking-tight">Password Generator</h1>
                    <p class="mt-2 text-slate-400">Create high-entropy passwords for your security.</p>
                </div>

                <div class="mt-10">
                    <div class="relative">
                        <input type="text" id="password-display" readonly class="w-full rounded-2xl border border-white/10 bg-white/5 py-5 pl-6 pr-24 font-mono text-xl text-brand-primary focus:outline-none">
                        <button id="copy-password" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-xl bg-brand-primary px-4 py-2 font-bold text-white hover:bg-brand-primary/90">Copy</button>
                    </div>

                    <div class="mt-10 space-y-6">
                        <div class="flex items-center justify-between">
                            <label class="font-bold text-slate-300">Password Length</label>
                            <span id="pass-length-val" class="font-mono text-xl font-bold text-brand-primary">16</span>
                        </div>
                        <input type="range" id="pass-length" min="6" max="64" value="16" class="h-2 w-full cursor-pointer appearance-none rounded-lg bg-slate-800 accent-brand-primary">

                        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                            <label class="flex cursor-pointer items-center space-x-3 rounded-xl border border-white/5 bg-white/5 p-4 hover:bg-white/10 transition-colors">
                                <input type="checkbox" id="include-uppercase" checked class="h-5 w-5 rounded accent-brand-primary">
                                <span class="font-medium">Uppercase (A-Z)</span>
                            </label>
                            <label class="flex cursor-pointer items-center space-x-3 rounded-xl border border-white/5 bg-white/5 p-4 hover:bg-white/10 transition-colors">
                                <input type="checkbox" id="include-lowercase" checked class="h-5 w-5 rounded accent-brand-primary">
                                <span class="font-medium">Lowercase (a-z)</span>
                            </label>
                            <label class="flex cursor-pointer items-center space-x-3 rounded-xl border border-white/5 bg-white/5 p-4 hover:bg-white/10 transition-colors">
                                <input type="checkbox" id="include-numbers" checked class="h-5 w-5 rounded accent-brand-primary">
                                <span class="font-medium">Numbers (0-9)</span>
                            </label>
                            <label class="flex cursor-pointer items-center space-x-3 rounded-xl border border-white/5 bg-white/5 p-4 hover:bg-white/10 transition-colors">
                                <input type="checkbox" id="include-symbols" checked class="h-5 w-5 rounded accent-brand-primary">
                                <span class="font-medium">Symbols (@!#%)</span>
                            </label>
                        </div>

                        <button id="generate-password" class="w-full rounded-2xl bg-brand-primary py-5 text-xl font-bold text-white shadow-lg shadow-brand-primary/25 hover:bg-brand-primary/90 transition-all">Generate New Password</button>
                    </div>
                </div>
            </div>

            <div class="ad-container mt-12 w-full">
                <div class="ad-placeholder">Tool Page Ad Unit</div>
            </div>
        </div>
    </main>

    <script src="/assets/js/common.js"></script>
    <script type="module" src="/assets/js/tools/password-generator.js"></script>
</body>
</html>
