<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator | FreeTools Hub</title>
    <meta name="description" content="Calculate your exact age in years, months, and days. Enter your date of birth and get instant results. Perfect for finding your next birthday countdown.">
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-surface text-slate-100">
    <header class="border-b border-white/5 bg-dark-surface/80 backdrop-blur-lg">
        <nav class="container mx-auto flex items-center justify-between px-6 py-4">
            <a href="/" class="flex items-center space-x-2">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-brand-primary to-brand-secondary text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">FreeTools<span class="text-brand-primary">Hub</span></span>
            </a>
            <a href="/" class="text-sm font-medium hover:text-brand-primary">Home</a>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="mx-auto max-w-xl">
            <div class="glass rounded-[2.5rem] p-8 md:p-12 text-center">
                <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-pink-500/10 text-pink-400">
                    <i class="fas fa-birthday-cake text-3xl"></i>
                </div>
                <h1 class="mt-6 text-3xl font-extrabold tracking-tight">Age Calculator</h1>
                <p class="mt-2 text-slate-400 text-lg">Find out exactly how old you are.</p>

                <div class="mt-12 space-y-6">
                    <div class="space-y-4">
                        <label class="block text-sm font-bold uppercase tracking-wider text-slate-500">Pick Date of Birth</label>
                        <input type="date" id="dob" class="w-full rounded-2xl border border-white/10 bg-white/5 py-4 px-6 text-lg text-white focus:border-brand-primary focus:outline-none transition-all cursor-pointer">
                    </div>

                    <button id="calculate-age" class="w-full rounded-2xl bg-brand-primary py-5 text-lg font-bold text-white shadow-lg shadow-brand-primary/25 hover:bg-brand-primary/90 transition-all">Calculate Age</button>
                    
                    <div id="age-result" class="hidden mt-10 grid-cols-3 gap-4 animate-fade-in">
                        <div class="rounded-2xl bg-brand-primary/10 p-6 border border-brand-primary/20">
                            <div id="age-years" class="text-4xl font-extrabold text-brand-primary">0</div>
                            <div class="text-xs font-bold uppercase tracking-widest text-slate-500 mt-1">Years</div>
                        </div>
                        <div class="rounded-2xl bg-brand-primary/10 p-6 border border-brand-primary/20">
                            <div id="age-months" class="text-4xl font-extrabold text-brand-primary">0</div>
                            <div class="text-xs font-bold uppercase tracking-widest text-slate-500 mt-1">Months</div>
                        </div>
                        <div class="rounded-2xl bg-brand-primary/10 p-6 border border-brand-primary/20">
                            <div id="age-days" class="text-4xl font-extrabold text-brand-primary">0</div>
                            <div class="text-xs font-bold uppercase tracking-widest text-slate-500 mt-1">Days</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/common.js"></script>
    <script type="module" src="/assets/js/tools/age-calculator.js"></script>
</body>
</html>
