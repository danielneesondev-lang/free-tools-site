<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker & Converter | FreeTools Hub</title>
    <meta name="description" content="Pick colors and get instant HEX and RGB values. A simple designer tool for choosing the perfect colors for your projects.">
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-surface text-slate-100">
    <header class="border-b border-white/5 bg-dark-surface/80 backdrop-blur-lg">
        <nav class="container mx-auto flex items-center justify-between px-6 py-4">
            <a href="/" class="flex items-center space-x-2">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-brand-primary to-brand-secondary text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">FreeTools<span class="text-brand-primary">Hub</span></span>
            </a>
            <a href="/" class="text-sm font-medium hover:text-brand-primary">Home</a>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="mx-auto max-w-2xl">
            <div class="glass rounded-[2.5rem] p-8 md:p-12">
                <div class="flex items-center space-x-4">
                    <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-rose-500/10 text-rose-400">
                        <i class="fas fa-eye-dropper text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tight">Color Picker</h1>
                        <p class="text-slate-400">Pick colors and get code values.</p>
                    </div>
                </div>

                <div class="mt-12 space-y-10">
                    <div class="flex flex-col items-center space-y-6 md:flex-row md:space-y-0 md:space-x-8">
                        <input type="color" id="color-input" value="#3b82f6" class="h-40 w-40 cursor-pointer overflow-hidden rounded-3xl border-none bg-transparent p-0 outline-none">
                        <div id="color-preview" class="h-40 w-full flex-1 rounded-3xl border border-white/10 shadow-inner transition-colors"></div>
                    </div>

                    <div class="grid gap-6">
                        <div class="space-y-3">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500">HEX Code</label>
                            <div class="relative">
                                <input type="text" id="hex-output" readonly value="#3B82F6" class="w-full rounded-2xl border border-white/10 bg-white/5 py-4 px-6 font-mono text-xl focus:outline-none">
                                <button id="copy-hex" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-lg bg-white/10 px-4 py-2 text-sm font-bold hover:bg-white/20">Copy</button>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500">RGB Value</label>
                            <div class="relative">
                                <input type="text" id="rgb-output" readonly value="rgb(59, 130, 246)" class="w-full rounded-2xl border border-white/10 bg-white/5 py-4 px-6 font-mono text-xl focus:outline-none">
                                <button id="copy-rgb" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-lg bg-white/10 px-4 py-2 text-sm font-bold hover:bg-white/20">Copy</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-20 prose prose-invert prose-slate max-w-none">
                    <h2 class="text-2xl font-bold">Designer Friendly</h2>
                    <p>Color is one of the most important aspects of design. Our Color Picker tool allows you to find the exact shades you need and quickly copy the values for your CSS or design software.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/common.js"></script>
    <script type="module" src="/assets/js/tools/color-picker.js"></script>
</body>
</html>
