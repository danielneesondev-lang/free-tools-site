<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator | FreeTools Hub</title>
    <meta name="description" content="Calculate your Body Mass Index (BMI) instantly. Find out if you are at a healthy weight based on your height and weight. Free and accurate online tool.">
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-surface text-slate-100">
    <header class="border-b border-white/5 bg-dark-surface/80 backdrop-blur-lg">
        <nav class="container mx-auto flex items-center justify-between px-6 py-4">
            <a href="/" class="flex items-center space-x-2">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-brand-primary to-brand-secondary text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">FreeTools<span class="text-brand-primary">Hub</span></span>
            </a>
            <a href="/" class="text-sm font-medium hover:text-brand-primary">Home</a>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="mx-auto max-w-xl">
            <div class="glass rounded-[2.5rem] p-8 md:p-12 text-center">
                <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-emerald-500/10 text-emerald-400">
                    <i class="fas fa-heartbeat text-3xl"></i>
                </div>
                <h1 class="mt-6 text-3xl font-extrabold tracking-tight">BMI Calculator</h1>
                <p class="mt-2 text-slate-400 text-lg">Check your healthy weight range.</p>

                <div class="mt-12 space-y-8">
                    <div class="grid gap-6 md:grid-cols-2">
                        <div class="space-y-2 text-left">
                            <label class="text-sm font-bold uppercase tracking-wider text-slate-500">Height (cm)</label>
                            <input type="number" id="bmi-height" placeholder="175" class="w-full rounded-2xl border border-white/10 bg-white/5 py-4 px-6 text-xl focus:border-brand-primary focus:outline-none transition-all">
                        </div>
                        <div class="space-y-2 text-left">
                            <label class="text-sm font-bold uppercase tracking-wider text-slate-500">Weight (kg)</label>
                            <input type="number" id="bmi-weight" placeholder="70" class="w-full rounded-2xl border border-white/10 bg-white/5 py-4 px-6 text-xl focus:border-brand-primary focus:outline-none transition-all">
                        </div>
                    </div>

                    <button id="calculate-bmi" class="w-full rounded-2xl bg-brand-primary py-5 text-xl font-bold text-white shadow-lg shadow-brand-primary/25 hover:bg-brand-primary/90 transition-all">Calculate My BMI</button>
                    
                    <div id="bmi-result-card" class="hidden animate-fade-in space-y-4 rounded-3xl bg-white/5 p-8 border border-white/5">
                        <div class="text-slate-500 font-bold uppercase tracking-widest">Your BMI Score</div>
                        <div id="bmi-value" class="text-6xl font-black text-brand-primary tracking-tighter">22.4</div>
                        <div id="bmi-status" class="text-2xl font-bold text-emerald-400">Normal weight</div>
                    </div>
                </div>

                <div class="mt-12 text-left prose prose-invert prose-slate text-sm opacity-60">
                    <p>* Note: BMI is an estimate and not a medical diagnosis. Consult a professional for health advice.</p>
                </div>
            </div>
            
            <div class="ad-container mt-12">
                <div class="ad-placeholder">Tool Page Ad Unit</div>
            </div>
        </div>
    </main>

    <script src="/assets/js/common.js"></script>
    <script type="module" src="/assets/js/tools/bmi-calculator.js"></script>
</body>
</html>
